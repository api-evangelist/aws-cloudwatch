aid: aws-cloudwatch
name: Amazon CloudWatch
description: >-
  Amazon CloudWatch is a monitoring and observability service from AWS that
  collects metrics, logs, and events from AWS resources, applications, and
  on-premises services. It enables operators to set alarms, visualize
  dashboards, automate responses, and troubleshoot performance across cloud
  workloads. The CloudWatch Query API and AWS SDKs expose programmatic access
  to metrics, alarms, dashboards, and Logs via AWS Signature Version 4
  authenticated HTTPS requests.
type: Index
