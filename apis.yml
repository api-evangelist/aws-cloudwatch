    name: Amazon CloudWatch API
    description: >-
      Query API for publishing and retrieving metrics, managing alarms, and
      configuring dashboards in Amazon CloudWatch. Requests are authenticated
      with AWS Signature Version 4 (SigV4) using AWS access keys or temporary
      IAM credentials.
    humanURL: https://docs.aws.amazon.com/AmazonCloudWatch/latest/APIReference/Welcome.html
